<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Central de Publicação — PostoCash</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo-icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
            display: ['Space Grotesk', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-[#f4f2ed] font-sans text-stone-900">
  <header class="sticky top-0 z-40 border-b border-stone-200 bg-white/85 backdrop-blur-xl">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
      <a href="index.html"><img src="assets/logo-minimal.svg" alt="PostoCash" class="h-9 w-auto" /></a>
      <div class="flex items-center gap-3">
        <a href="blog.html" class="rounded-full border border-stone-300 px-4 py-2 text-xs font-semibold transition hover:bg-white">Ver conteúdos</a>
        <button id="logout" class="rounded-full bg-stone-900 px-4 py-2 text-xs font-semibold text-white transition hover:bg-stone-700">Sair</button>
      </div>
    </div>
  </header>

  <main class="mx-auto grid max-w-7xl gap-8 px-6 py-10 lg:grid-cols-[.9fr_1.1fr]">
    <section class="rounded-3xl border border-stone-200 bg-white p-6 shadow-xl shadow-stone-200/60">
      <p class="mb-2 text-[11px] font-mono uppercase tracking-widest text-orange-600">Novo conteúdo</p>
      <h1 class="font-display text-3xl font-semibold tracking-tight">Publicar artigo</h1>
      <p class="mt-3 text-sm leading-relaxed text-stone-500">Ao salvar como publicado, um card entra automaticamente na página de conteúdos. O artigo completo abre em `post.html`.</p>

      <form id="post-form" class="mt-8 space-y-4">
        <input type="hidden" name="editingSlug" />
        <label class="block">
          <span class="mb-1.5 block text-xs font-semibold text-stone-700">Título</span>
          <input name="title" required class="w-full rounded-xl border border-stone-300 px-4 py-3 text-sm outline-none transition focus:border-stone-900" placeholder="Ex: Como aumentar a recorrência do posto..." />
        </label>
        <div class="grid gap-4 md:grid-cols-2">
          <label class="block">
            <span class="mb-1.5 block text-xs font-semibold text-stone-700">Categoria</span>
            <input name="category" required class="w-full rounded-xl border border-stone-300 px-4 py-3 text-sm outline-none transition focus:border-stone-900" placeholder="Recorrência" />
          </label>
          <label class="block">
            <span class="mb-1.5 block text-xs font-semibold text-stone-700">Status</span>
            <select name="status" class="w-full rounded-xl border border-stone-300 px-4 py-3 text-sm outline-none transition focus:border-stone-900">
              <option value="published">Publicado</option>
              <option value="draft">Rascunho</option>
            </select>
          </label>
        </div>
        <label class="block">
          <span class="mb-1.5 block text-xs font-semibold text-stone-700">Resumo do card</span>
          <textarea name="summary" rows="3" required class="w-full resize-none rounded-xl border border-stone-300 px-4 py-3 text-sm outline-none transition focus:border-stone-900" placeholder="Resumo curto para aparecer no card do blog."></textarea>
        </label>
        <label class="block">
          <span class="mb-1.5 block text-xs font-semibold text-stone-700">Conteúdo completo</span>
          <textarea name="content" rows="12" required class="w-full rounded-xl border border-stone-300 px-4 py-3 text-sm leading-relaxed outline-none transition focus:border-stone-900" placeholder="Escreva o artigo completo aqui. Use parágrafos separados por linhas em branco."></textarea>
        </label>
        <div class="flex flex-wrap gap-3">
          <button class="rounded-xl bg-stone-900 px-5 py-3 text-sm font-semibold text-white transition hover:bg-stone-700" type="submit">Salvar conteúdo</button>
          <button id="clear-form" class="rounded-xl border border-stone-300 px-5 py-3 text-sm font-semibold transition hover:bg-stone-50" type="button">Limpar</button>
        </div>
      </form>
    </section>

    <section>
      <div class="mb-5 flex items-end justify-between gap-4">
        <div>
          <p class="mb-2 text-[11px] font-mono uppercase tracking-widest text-stone-400">Biblioteca</p>
          <h2 class="font-display text-3xl font-semibold tracking-tight">Conteúdos cadastrados</h2>
        </div>
        <span id="post-count" class="rounded-full border border-stone-200 bg-white px-3 py-1.5 text-xs font-semibold text-stone-500"></span>
      </div>
      <div id="posts-list" class="space-y-4"></div>
    </section>
  </main>

  <script>
    if (localStorage.getItem('postocash_admin_session') !== 'active') {
      window.location.href = 'login.html';
    }

    const form = document.getElementById('post-form');
    const list = document.getElementById('posts-list');
    const count = document.getElementById('post-count');

    function slugify(text) {
      return String(text)
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '')
        .slice(0, 80);
    }

    function getPosts() {
      try {
        return JSON.parse(localStorage.getItem('postocash_posts') || '[]');
      } catch {
        return [];
      }
    }

    function savePosts(posts) {
      localStorage.setItem('postocash_posts', JSON.stringify(posts));
    }

    function resetForm() {
      form.reset();
      form.editingSlug.value = '';
    }

    function renderPosts() {
      const posts = getPosts();
      count.textContent = `${posts.length} conteúdo${posts.length === 1 ? '' : 's'}`;
      list.innerHTML = posts.length ? posts.map(post => `
        <article class="rounded-2xl border border-stone-200 bg-white p-5 shadow-lg shadow-stone-200/50">
          <div class="flex flex-col justify-between gap-4 md:flex-row md:items-start">
            <div>
              <div class="mb-3 flex flex-wrap items-center gap-2">
                <span class="rounded-full bg-orange-50 px-3 py-1 text-[10px] font-mono uppercase tracking-widest text-orange-700">${post.category}</span>
                <span class="rounded-full ${post.status === 'published' ? 'bg-emerald-50 text-emerald-700' : 'bg-stone-100 text-stone-500'} px-3 py-1 text-[10px] font-mono uppercase tracking-widest">${post.status === 'published' ? 'Publicado' : 'Rascunho'}</span>
              </div>
              <h3 class="font-display text-2xl font-semibold">${post.title}</h3>
              <p class="mt-2 text-sm leading-relaxed text-stone-500">${post.summary}</p>
              <a href="post.html?slug=${encodeURIComponent(post.slug)}" class="mt-4 inline-flex text-xs font-semibold text-stone-900 hover:text-orange-600">Abrir artigo completo</a>
            </div>
            <div class="flex gap-2 md:flex-col">
              <button class="edit rounded-lg border border-stone-300 px-3 py-2 text-xs font-semibold hover:bg-stone-50" data-slug="${post.slug}">Editar</button>
              <button class="delete rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-xs font-semibold text-red-700 hover:bg-red-100" data-slug="${post.slug}">Excluir</button>
            </div>
          </div>
        </article>
      `).join('') : '<div class="rounded-2xl border border-dashed border-stone-300 p-8 text-center text-stone-500">Nenhum conteúdo cadastrado ainda.</div>';

      list.querySelectorAll('.edit').forEach(button => {
        button.addEventListener('click', () => {
          const post = getPosts().find(item => item.slug === button.dataset.slug);
          if (!post) return;
          form.editingSlug.value = post.slug;
          form.title.value = post.title;
          form.category.value = post.category;
          form.status.value = post.status;
          form.summary.value = post.summary;
          form.content.value = post.content;
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      });

      list.querySelectorAll('.delete').forEach(button => {
        button.addEventListener('click', () => {
          if (!confirm('Excluir este conteúdo?')) return;
          savePosts(getPosts().filter(post => post.slug !== button.dataset.slug));
          renderPosts();
        });
      });
    }

    form.addEventListener('submit', event => {
      event.preventDefault();
      const data = new FormData(form);
      const editingSlug = String(data.get('editingSlug') || '');
      const baseSlug = slugify(data.get('title'));
      const posts = getPosts();
      const slug = editingSlug || `${baseSlug}-${Date.now().toString(36)}`;
      const post = {
        slug,
        title: String(data.get('title') || '').trim(),
        category: String(data.get('category') || '').trim(),
        status: String(data.get('status') || 'published'),
        summary: String(data.get('summary') || '').trim(),
        content: String(data.get('content') || '').trim(),
        updatedAt: new Date().toISOString()
      };

      const nextPosts = editingSlug
        ? posts.map(item => item.slug === editingSlug ? post : item)
        : [post, ...posts];

      savePosts(nextPosts);
      resetForm();
      renderPosts();
    });

    document.getElementById('clear-form').addEventListener('click', resetForm);
    document.getElementById('logout').addEventListener('click', () => {
      localStorage.removeItem('postocash_admin_session');
      window.location.href = 'login.html';
    });

    renderPosts();
  </script>
</body>
</html>
