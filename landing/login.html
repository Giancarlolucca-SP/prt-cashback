<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Área do Posto — Central PostoCash</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo-icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
            display: ['Space Grotesk', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-[#0f172a] font-sans text-white">
  <main class="flex min-h-screen items-center justify-center px-6 py-12">
    <section class="w-full max-w-md rounded-3xl border border-white/10 bg-white/10 p-8 shadow-2xl backdrop-blur-xl">
      <img src="assets/logo-dark-bg.svg" alt="PostoCash" class="mb-8 h-10 w-auto" />
      <p class="mb-2 text-[11px] font-mono uppercase tracking-widest text-orange-300">Área do Posto</p>
      <h1 class="font-display text-3xl font-semibold tracking-tight">Entrar na central</h1>
      <p class="mt-3 text-sm leading-relaxed text-white/60">Acesse para publicar conteúdos e alimentar os cards da página de SEO.</p>

      <form id="login-form" class="mt-8 space-y-4">
        <label class="block">
          <span class="mb-1.5 block text-xs font-semibold text-white/80">Usuário</span>
          <input name="usuario" required class="w-full rounded-xl border border-white/15 bg-white px-4 py-3 text-sm text-stone-900 outline-none transition focus:border-orange-400" placeholder="admin" />
        </label>
        <label class="block">
          <span class="mb-1.5 block text-xs font-semibold text-white/80">Senha</span>
          <input name="senha" type="password" required class="w-full rounded-xl border border-white/15 bg-white px-4 py-3 text-sm text-stone-900 outline-none transition focus:border-orange-400" placeholder="postocash2026" />
        </label>
        <p id="login-error" class="hidden rounded-xl border border-red-400/30 bg-red-500/10 px-4 py-3 text-sm text-red-100">Usuário ou senha inválidos.</p>
        <button class="w-full rounded-xl bg-orange-500 px-5 py-3.5 text-sm font-semibold text-white transition hover:bg-orange-600" type="submit">Entrar</button>
      </form>

      <div class="mt-6 flex justify-between text-xs text-white/50">
        <a href="blog.html" class="hover:text-white">Voltar aos conteúdos</a>
        <span>admin / postocash2026</span>
      </div>
    </section>
  </main>

  <script>
    document.getElementById('login-form').addEventListener('submit', event => {
      event.preventDefault();
      const data = new FormData(event.currentTarget);
      const user = String(data.get('usuario') || '').trim();
      const pass = String(data.get('senha') || '').trim();

      if (user === 'admin' && pass === 'postocash2026') {
        localStorage.setItem('postocash_admin_session', 'active');
        window.location.href = 'central.html';
        return;
      }

      document.getElementById('login-error').classList.remove('hidden');
    });
  </script>
</body>
</html>
